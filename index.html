<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🔑 KEYMASTER – SOLID PATROL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;background:#0d0d1a;color:#fff;height:100vh;display:flex;flex-direction:column}
  #brand-header {background:#111122;border-bottom:3px solid #e53935;padding:12px;display:flex;align-items:center;gap:10px}
  #brand-header h1 {font-size:18px;font-weight:900}
  #topbar{background:#1a1a2e;padding:10px}
  .row{display:flex;gap:5px;flex-wrap:wrap}
  button{background:#e53935;color:#fff;border:none;padding:8px;border-radius:4px;font-weight:700}
  #content{flex:1;position:relative}
  #map{height:100%;width:100%}
</style>
</head>
<body>
<div id="brand-header"><h1>SOLID PATROL 110</h1></div>
<div id="topbar">
  <div class="row">
    <button onclick="alert('System gotowy. Wczytaj PDF.')">🔑 KLUCZE</button>
    <button onclick="document.getElementById('file-pdf').click()">📄 Wczytaj PDF</button>
  </div>
</div>
<div id="content"><div id="map"></div></div>
<input type="file" id="file-pdf" accept=".pdf" style="display:none" onchange="loadPdf(event)"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  let map = L.map('map').setView([53.4837, 18.7536], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
  
  async function loadPdf(e) {
    const file = e.target.files[0];
    if(!file) return;
    alert('Wczytuję PDF... (Logika geokodowania zostanie dodana w kolejnym kroku)');
    const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
    alert('PDF wczytany poprawnie! Posiada ' + pdf.numPages + ' stron.');
  }
</script>
</body>
</html>
