<style>

/* ── CONTENT ── */

</style>

<!-- ══ SKRYPTY ══ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
'use strict';
// ──────────────────────────────────────────────────────────────────────────────
// KONFIGURACJA
// ──────────────────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const LS = { keys:'solidKeys_v4', pilots:'solidPilots_v4' };

// ──────────────────────────────────────────────────────────────────────────────
// STAN
// ──────────────────────────────────────────────────────────────────────────────
let state = { keys:[], pilots:[] };
let tab = 'keys';
let currentView = 'map';
let addMode = false;
let editingId = null;
let pendingLL = null;       // {lat,lng} oczekujące na modal
let searchQ = '';
let map, clusterGroup, markerById = {}, userMarker = null;

// ──────────────────────────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/[&<>"']/g,
    m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function ts(){
  return new Date().toLocaleString('pl-PL',
    {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function setStatus(msg,spin=false){
  document.getElementById('statusbar').innerHTML =
    spin ? '<span style="color:#c62828">⏳</span> '+msg : msg;
}
function showProg(pct){
  const w=document.getElementById('progwrap');
  const b=document.getElementById('progbar');
  w.style.display='block'; b.style.width=Math.min(pct,100)+'%';
}
function hideProg(){
  document.getElementById('progwrap').style.display='none';
  document.getElementById('progbar').style.width='0%';
}
function uid(){ return Date.now()+Math.random(); }

// ──────────────────────────────────────────────────────────────────────────────
// PARSOWANIE ADRESU → MIASTO / ULICA / NR
// ──────────────────────────────────────────────────────────────────────────────
const CITIES = ['turznice','wałdowo','gubiny','miłoleśna','brzeźna','węgrowo','grudziądz'];

function parseAddress(raw){
  // Zamień skróty Gr. / Gr  na Grudziądz
  let s = (raw||'').replace(/\bGr\.?\s*/gi,'Grudziądz ').trim();

  let city = 'Grudziądz';
  let street = s;

  // Szukaj nazwy miasta na początku lub końcu
  for(const c of CITIES){
    const re = new RegExp('\\b'+c+'\\b','i');
    if(re.test(s)){
      city = c.charAt(0).toUpperCase()+c.slice(1);
      street = s.replace(re,'').replace(/^[,\s]+|[,\s]+$/g,'');
      break;
    }
  }

  // Wydziel numer domu/działki
  // Działki: "dz.", "działka", "nr dz"
  let houseNr = '';
  let streetName = street;

  const dzMatch = street.match(/(?:dz\.?|działka|nr\.?\s*dz\.?)\s*([\w\/\-]+)/i);
  if(dzMatch){
    houseNr = 'dz. '+dzMatch[1];
    streetName = street.replace(dzMatch[0],'').trim();
  } else {
    // Standardowy numer domu: cyfry na końcu, opcjonalnie z literą lub /
    const numMatch = street.match(/(\d+[\w\/\-]*)$/);
    if(numMatch){
      houseNr = numMatch[1];
      streetName = street.slice(0,street.lastIndexOf(numMatch[1])).trim();
    }
  }
  streetName = streetName.replace(/[,\s]+$/,'').trim();

  return { city, street: streetName||street, houseNr };
}

// Buduje pełny adres do geokodowania
function buildGeoQuery(item){
  const p = parseAddress(item.address);
  // Jeśli działka – poszukaj obszarowo
  if(/dz\.|działka/i.test(item.address)){
    return p.street + ' ' + p.houseNr + ', ' + p.city + ', Polska';
  }
  return (item.address||'').replace(/\bGr\.?\s*/gi,'Grudziądz ')+', Polska';
}

// ──────────────────────────────────────────────────────────────────────────────
// GEOKODOWANIE – SEKWENCYJNE (1 req/s – zgodność z Nominatim)
// ──────────────────────────────────────────────────────────────────────────────
async function geocodeOne(item){
  const q = buildGeoQuery(item);
  try{
    const res = await fetch(
      'https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+
      '&format=json&limit=1&countrycodes=pl',
      {headers:{'Accept-Language':'pl','User-Agent':'SolidPatrol110/1.0'}}
    );
    const data = await res.json();
    if(data && data[0]) return {lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
  }catch(e){}
  return null;
}

async function geocodeAll(items, onProg){
  const results = [];
  for(let i=0;i<items.length;i++){
    onProg(i+1, items.length, items[i].address);
    showProg((i+1)/items.length*100);
    const c = await geocodeOne(items[i]);
    results.push(c);
    if(i < items.length-1) await new Promise(r=>setTimeout(r,1100)); // 1.1s – Nominatim limit
  }
  return results;
}

// ──────────────────────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  try{
    const k=localStorage.getItem(LS.keys);   if(k) state.keys=JSON.parse(k);
    const p=localStorage.getItem(LS.pilots); if(p) state.pilots=JSON.parse(p);
  }catch(e){}

  initMap();

  if(state.keys.length===0 && state.pilots.length===0){
    document.getElementById('nodata-overlay').classList.add('open');
    setStatus('Baza pusta. Wczytaj dane.');
  } else {
    setStatus('✓ Baza wczytana — Klucze: '+state.keys.length+', Piloty: '+state.pilots.length);
  }
  switchTab('keys');
});

// ──────────────────────────────────────────────────────────────────────────────
// MAPA
// ──────────────────────────────────────────────────────────────────────────────
function initMap(){
  map = L.map('map',{zoomControl:true}).setView([53.4837,18.7536],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:19
  }).addTo(map);

  // Wyszukiwarka na mapie (lewy górny róg)
  const SearchCtrl = L.Control.extend({
    options:{position:'topleft'},
    onAdd:function(){
      const div = L.DomUtil.create('div','mapsearch-wrap');
      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);
      div.innerHTML =
        '<input type="text" id="ms-input" placeholder="🔍 Szukaj na mapie...">'+
        '<div id="ms-results"></div>';
      div.querySelector('#ms-input').addEventListener('input',function(){
        mapSearch(this.value);
      });
      return div;
    }
  });
  map.addControl(new SearchCtrl());

  // Klik w mapę – tryb dodawania
  map.on('click',e=>{
    if(!addMode) return;
    pendingLL = e.latlng;
    openModal(null, e.latlng);
    toggleAddMode(false);
  });

  // GPS zdarzenia
  map.on('locationfound',e=>{
    setStatus('✓ Pozycja GPS: '+e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5));
    if(userMarker) userMarker.setLatLng(e.latlng);
    else userMarker = L.circleMarker(e.latlng,{
      radius:9,fillColor:'#2196F3',color:'#fff',weight:2,fillOpacity:.95
    }).addTo(map).bindPopup('<b style="font-family:sans-serif">📍 Twoja pozycja</b>');
  });
  map.on('locationerror',e=>setStatus('❌ GPS niedostępny: '+e.message));
}

// ──────────────────────────────────────────────────────────────────────────────
// WYSZUKIWARKA NA MAPIE
// ──────────────────────────────────────────────────────────────────────────────
function mapSearch(q){
  const div = document.getElementById('ms-results');
  if(!q.trim()){div.style.display='none';return;}
  const sq = q.toLowerCase();
  const hits = state[tab].filter(it=>
    it.lat &&
    ((it.nr||'').toLowerCase().includes(sq) ||
     (it.name||'').toLowerCase().includes(sq) ||
     (it.address||'').toLowerCase().includes(sq))
  ).slice(0,7);

  if(!hits.length){
    div.innerHTML='<div class="msri"><span class="msri-addr">Brak wyników</span></div>';
  } else {
    div.innerHTML = hits.map(it=>`
      <div class="msri" onclick="focusMarker(${it.id})">
        <span class="msri-label">KLUCZ #${esc(it.nr)}</span>
        <span class="msri-name">${esc(it.name)}</span>
        <span class="msri-addr">${esc(it.address)}</span>
      </div>`).join('');
  }
  div.style.display='block';
}

function focusMarker(id){
  document.getElementById('ms-results').style.display='none';
  document.getElementById('ms-input').value='';
  const m = markerById[id];
  if(!m) return;
  clusterGroup.zoomToShowLayer(m,()=>m.openPopup());
}

// ──────────────────────────────────────────────────────────────────────────────
// SYNCHRONIZACJA PINEZEK
// ──────────────────────────────────────────────────────────────────────────────
function syncMarkers(){
  if(clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    disableClusteringAtZoom:16,
    maxClusterRadius:50,
    iconCreateFunction:function(cluster){
      const n=cluster.getChildCount();
      return L.divIcon({
        html:`<div style="background:#c62828;color:#fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)">${n}</div>`,
        iconSize:[38,38],className:''
      });
    }
  });
  markerById={};

  const sq=searchQ.toLowerCase();
  const visible = sq ? state[tab].filter(it=>
    (it.nr||'').toLowerCase().includes(sq)||
    (it.name||'').toLowerCase().includes(sq)||
    (it.address||'').toLowerCase().includes(sq)
  ) : state[tab];

  for(const item of visible){
    if(!item.lat||!item.lng) continue;
    const iconHtml=`
      <div style="background:#c62828;color:#fff;border-radius:50% 50% 50% 0;
        width:36px;height:36px;display:flex;align-items:center;justify-content:center;
        font-size:11px;font-weight:900;border:2px solid #fff;
        box-shadow:0 3px 10px rgba(0,0,0,.6);transform:rotate(-45deg);
        font-family:'Courier New',monospace">
        <span style="transform:rotate(45deg)">${esc(item.nr)}</span>
      </div>`;
    const marker = L.marker([item.lat,item.lng],{
      icon:L.divIcon({html:iconHtml,iconSize:[36,36],iconAnchor:[18,36],popupAnchor:[0,-38],className:''}),
      draggable:true
    });
    marker.bindPopup(buildPopup(item),{maxWidth:300});
    marker.on('dragend',ev=>{
      const ll=ev.target.getLatLng();
      const idx=state[tab].findIndex(i=>i.id===item.id);
      if(idx>-1){
        state[tab][idx].lat=ll.lat;
        state[tab][idx].lng=ll.lng;
        state[tab][idx].updatedAt=ts();
        marker.getPopup().setContent(buildPopup(state[tab][idx]));
        saveToMem();
        if(currentView==='list') renderList();
      }
    });
    markerById[item.id]=marker;
    clusterGroup.addLayer(marker);
  }
  map.addLayer(clusterGroup);
}

function buildPopup(item){
  const p = parseAddress(item.address);
  const nav=`https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`;
  return `
    <div class="pop-head">
      <span class="pop-badge">#${esc(item.nr)}</span>
      <span class="pop-title">${esc(item.name)}</span>
    </div>
    <div class="pop-body">
      <div class="pop-addr">
        ${p.street ? '🏠 '+esc(p.street)+' '+esc(p.houseNr) : '📍 '+esc(item.address)}<br>
        <span style="color:#aaa;font-size:12px">📌 ${esc(p.city)}</span>
      </div>
      <div class="pop-gps">${item.lat?item.lat.toFixed(6)+', '+item.lng.toFixed(6):''}</div>
      ${item.updatedAt?`<div class="pop-ts">✏️ Edytowano: ${esc(item.updatedAt)}</div>`:''}
      <a href="${nav}" target="_blank" class="pop-nav">🧭 Wyznacz Trasę Google Maps</a>
      <div class="pop-actions">
        <button class="pop-edit" onclick="popEdit(${item.id})">✏️ Edytuj</button>
        <button class="pop-del" onclick="popDel(${item.id})">🗑️ Usuń</button>
      </div>
    </div>`;
}

function popEdit(id){ map.closePopup(); openModal(id); }
function popDel(id){
  if(!confirm('Usunąć ten obiekt z bazy?')) return;
  state[tab]=state[tab].filter(i=>i.id!==id);
  saveToMem(); syncMarkers(); renderList();
}

function fitMap(){
  if(clusterGroup && clusterGroup.getLayers().length>0)
    map.fitBounds(clusterGroup.getBounds(),{padding:[50,50],maxZoom:16});
}

function locateMe(){ setStatus('⏳ Szukam pozycji GPS...',true); map.locate({setView:true,maxZoom:16}); }

// ──────────────────────────────────────────────────────────────────────────────
// ZAKŁADKI I WIDOKI
// ──────────────────────────────────────────────────────────────────────────────
function switchTab(t){
  tab=t;
  document.getElementById('tab-keys').classList.toggle('active',t==='keys');
  document.getElementById('tab-pilots').classList.toggle('active',t==='pilots');
  syncMarkers(); renderList(); updateUI();
  if(currentView==='map') setTimeout(fitMap,200);
}

function switchView(v){
  currentView=v;
  document.getElementById('vbtn-map').classList.toggle('active',v==='map');
  document.getElementById('vbtn-list').classList.toggle('active',v==='list');
  document.getElementById('map').style.display      = v==='map'  ? 'block':'none';
  document.getElementById('list-view').style.display= v==='list' ? 'block':'none';
  document.getElementById('add-btn').style.display  = v==='map'  ? 'block':'none';
  document.getElementById('gps-btn').style.display  = v==='map'  ? 'flex' :'none';
  if(v==='map'){ setTimeout(()=>{map.invalidateSize();fitMap();},150); }
  if(v==='list') renderList();
}

function onSearch(q){
  searchQ=q;
  syncMarkers();
  if(currentView==='list') renderList();
}

// ──────────────────────────────────────────────────────────────────────────────
// LISTA
// ──────────────────────────────────────────────────────────────────────────────
function renderList(){
  const sq=searchQ.toLowerCase();
  const rows = sq ? state[tab].filter(it=>
    (it.nr||'').toLowerCase().includes(sq)||
    (it.name||'').toLowerCase().includes(sq)||
    (it.address||'').toLowerCase().includes(sq)
  ) : state[tab];

  const tbl=document.getElementById('data-table');
  const emp=document.getElementById('list-empty');
  if(!rows.length){ tbl.style.display='none'; emp.style.display='block'; return; }
  tbl.style.display='table'; emp.style.display='none';

  document.getElementById('tbody').innerHTML = rows.map(item=>{
    const hasGps = !!(item.lat && item.lng);
    return `<tr>
      <td class="${hasGps?'td-nr-ok':'td-nr-err'}">#${esc(item.nr)}</td>
      <td><div class="td-name">${esc(item.name)}</div><div class="td-addr">${esc(item.address)}</div></td>
      <td class="${hasGps?'td-gps-ok':'td-gps-err'}">${hasGps?'✓ GPS':'✗ BRAK'}</td>
      <td>
        <button class="btn-sm" onclick="openModal(${item.id})">✏️</button>
        <button class="btn-sm btn-sm-red" onclick="delItem(${item.id})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function delItem(id){
  if(!confirm('Usunąć?')) return;
  state[tab]=state[tab].filter(i=>i.id!==id);
  saveToMem(); syncMarkers(); renderList();
}

// ──────────────────────────────────────────────────────────────────────────────
// MODAL DODAJ / EDYTUJ
// ──────────────────────────────────────────────────────────────────────────────
function toggleAddMode(force){
  addMode = force!==undefined ? force : !addMode;
  const btn=document.getElementById('add-btn');
  btn.textContent = addMode ? '✕ Anuluj' : '+ Dodaj ręcznie';
  btn.classList.toggle('active',addMode);
}

function openModal(id=null, latlng=null){
  editingId=id;
  document.getElementById('modal-title').textContent = id ? '✏️ Edytuj pozycję' : '📍 Dodaj nową pozycję';
  if(id){
    const item=state[tab].find(i=>i.id===id);
    if(!item) return;
    pendingLL={lat:item.lat,lng:item.lng};
    const p=parseAddress(item.address);
    document.getElementById('m-nr').value   = item.nr||'';
    document.getElementById('m-name').value = item.name||'';
    document.getElementById('m-addr').value = (p.street+(p.houseNr?' '+p.houseNr:''))||item.address||'';
    document.getElementById('m-city').value = p.city||'Grudziądz';
  } else {
    pendingLL=latlng;
    ['m-nr','m-name','m-addr'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('m-city').value='Grudziądz';
  }
  const ginfo=document.getElementById('mgps-info');
  ginfo.textContent = pendingLL&&pendingLL.lat
    ? 'GPS: '+pendingLL.lat.toFixed(5)+', '+pendingLL.lng.toFixed(5)
    : '⚠ Brak GPS – obiekt trafi tylko na listę';
  document.getElementById('modal-edit').classList.add('open');
  setTimeout(()=>document.getElementById('m-nr').focus(),100);
}

function closeModal(){ document.getElementById('modal-edit').classList.remove('open'); }
function closeNoData(){ document.getElementById('nodata-overlay').classList.remove('open'); }

async function savePin(){
  const nr   = document.getElementById('m-nr').value.trim();
  if(!nr){ alert('Numer obiektu jest wymagany!'); return; }
  const name = document.getElementById('m-name').value.trim();
  const addr = document.getElementById('m-addr').value.trim();
  const city = document.getElementById('m-city').value.trim()||'Grudziądz';
  const fullAddr = addr + (city&&city.toLowerCase()!==addr.toLowerCase() ? ', '+city : '');

  const now = ts();
  if(editingId){
    const idx=state[tab].findIndex(i=>i.id===editingId);
    if(idx>-1) state[tab][idx]={...state[tab][idx],nr,name,address:fullAddr,updatedAt:now};
  } else {
    state[tab].push({id:uid(),nr,name,address:fullAddr,
      lat:pendingLL?.lat||null, lng:pendingLL?.lng||null,
      createdAt:now, updatedAt:now});
  }
  closeModal(); saveToMem(); syncMarkers(); renderList(); updateUI();
}

// ──────────────────────────────────────────────────────────────────────────────
// WCZYTAJ PDF
// ──────────────────────────────────────────────────────────────────────────────
function triggerPdf(){ document.getElementById('file-pdf').click(); }

async function handlePdf(e){
  const file=e.target.files[0]; if(!file) return;
  e.target.value='';
  setStatus('⏳ Wczytuję PDF...',true); showProg(0);
  try{
    const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    let fullText='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      let line='',lastY=null;
      for(const it of content.items){
        const y=it.transform[5];
        if(lastY!==null && Math.abs(y-lastY)>5){ fullText+=line+'\n'; line=''; }
        line+=it.str+'  '; lastY=y;
      }
      if(line) fullText+=line+'\n';
    }

    const parsed=parsePdfLines(fullText);
    if(!parsed.length){ setStatus('❌ Nie znaleziono wierszy danych w PDF.'); hideProg(); return; }

    setStatus(`⏳ Znaleziono ${parsed.length} poz. Geokuduję sekwencyjnie (1 req/s)...`,true);
    const coords = await geocodeAll(parsed,(done,total,addr)=>{
      setStatus(`⏳ Geokuduję ${done}/${total}: ${addr}`,true);
    });

    state[tab]=parsed.map((item,i)=>({
      ...item, lat:coords[i]?.lat??null, lng:coords[i]?.lng??null
    }));
    saveToMem(); closeNoData(); syncMarkers(); renderList(); updateUI();
    hideProg();
    const ok=state[tab].filter(x=>x.lat).length;
    setStatus(`✓ Załadowano ${state[tab].length} poz. — ${ok} z GPS, ${state[tab].length-ok} bez GPS`);
    setTimeout(fitMap,400);
  }catch(err){
    setStatus('❌ Błąd PDF: '+err.message); hideProg();
  }
}

function parsePdfLines(text){
  const items=[];
  for(const line of text.split('\n')){
    const raw=line.trim().replace(/\bGr\.?\s*/gi,'Grudziądz ');
    const parts=raw.split(/\s{2,}|\t/).map(s=>s.trim()).filter(Boolean);
    if(parts.length>=2 && /^\d+/.test(parts[0])){
      items.push({
        id:uid(), nr:parts[0],
        address:parts[1]||'',
        name:parts[2]||'',
        lat:null, lng:null,
        createdAt:ts()
      });
    }
  }
  return items;
}

// ──────────────────────────────────────────────────────────────────────────────
// BACKUP JSON
// ──────────────────────────────────────────────────────────────────────────────
function triggerJson(){ document.getElementById('file-json').click(); }

function exportJson(){
  document.getElementById('ddmenu').classList.remove('open');
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(blob),download:'solid_patrol_backup_'+Date.now()+'.json'});
  a.click(); URL.revokeObjectURL(a.href);
  setStatus('✓ Pobrano kopię JSON ('+state.keys.length+' kluczy, '+state.pilots.length+' pilotów)');
}

function handleJson(e){
  const file=e.target.files[0]; if(!file) return;
  e.target.value='';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data.keys) && Array.isArray(data.pilots)){
        state=data; saveToMem(); closeNoData(); switchTab('keys');
        setStatus('✓ Przywrócono bazę — Klucze: '+state.keys.length+', Piloty: '+state.pilots.length);
        setTimeout(fitMap,400);
      } else { alert('Nieprawidłowy plik kopii zapasowej!'); }
    }catch(err){ alert('Błąd odczytu JSON: '+err.message); }
  };
  reader.readAsText(file);
}

// ──────────────────────────────────────────────────────────────────────────────
// EKSPORT PDF
// ──────────────────────────────────────────────────────────────────────────────
async function exportPdf(){
  document.getElementById('ddmenu').classList.remove('open');
  const data=state[tab];
  if(!data.length){ setStatus('Brak danych do eksportu.'); return; }
  setStatus('⏳ Generuję PDF...',true);
  try{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.create();
    const font=await doc.embedFont(StandardFonts.Helvetica);
    const bold=await doc.embedFont(StandardFonts.HelveticaBold);
    const [W,H]=[595,842]; const M=35;
    let page=doc.addPage([W,H]); let y=H-45;

    // Nagłówek
    const RED=rgb(0.78,0.16,0.16);
    const GRAY=rgb(0.5,0.5,0.5);
    const BLACK=rgb(0.08,0.08,0.08);

    page.drawText('SOLID PATROL 110 GRUDZIĄDZ'  ,{x:M,y,font:bold,size:15,color:RED}); y-=20;
    page.drawText((tab==='keys'?'REJESTR KLUCZY':'REJESTR PILOTÓW')+' — '+new Date().toLocaleDateString('pl-PL'),
      {x:M,y,font:bold,size:11,color:BLACK}); y-=8;
    page.drawLine({start:{x:M,y},end:{x:W-M,y},thickness:1.5,color:RED}); y-=14;

    // Nagłówki kolumn
    const cols=[0,36,130,260,380,470];
    const hdrs=['NR','NAZWA','ULICA','NR DOMU/DZ.','MIASTO','GPS LAT,LNG'];
    hdrs.forEach((h,i)=>page.drawText(h,{x:M+cols[i],y,font:bold,size:8,color:GRAY}));
    y-=4;
    page.drawLine({start:{x:M,y},end:{x:W-M,y},thickness:.5,color:rgb(.85,.85,.85)}); y-=12;

    for(const item of data){
      if(y<50){ page=doc.addPage([W,H]); y=H-45; }
      const p=parseAddress(item.address);
      const gps=item.lat?item.lat.toFixed(4)+' '+item.lng.toFixed(4):'';
      const row=[
        (item.nr||'').slice(0,6),
        (item.name||'').slice(0,20),
        (p.street||'').slice(0,22),
        (p.houseNr||'').slice(0,12),
        (p.city||'').slice(0,14),
        gps.slice(0,20)
      ];
      row.forEach((txt,i)=>{
        if(txt) page.drawText(txt,{x:M+cols[i],y,font,size:8,color:BLACK});
      });
      // Kolor paska wg statusu GPS
      if(!item.lat){
        page.drawRectangle({x:M,y:y-2,width:3,height:11,color:RED,opacity:.7});
      }
      y-=13;
    }

    const bytes=await doc.save();
    const a=Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([bytes],{type:'application/pdf'})),
      download:(tab==='keys'?'klucze':'piloty')+'_'+Date.now()+'.pdf'
    });
    a.click(); URL.revokeObjectURL(a.href);
    setStatus('✓ Pobrano PDF ('+data.length+' pozycji)');
  }catch(err){ setStatus('❌ Błąd PDF: '+err.message); }
}

// ──────────────────────────────────────────────────────────────────────────────
// EKSPORT XLSX
// ──────────────────────────────────────────────────────────────────────────────
function exportXlsx(){
  document.getElementById('ddmenu').classList.remove('open');
  const data=state[tab];
  if(!data.length){ setStatus('Brak danych.'); return; }
  try{
    const rows=data.map(item=>{
      const p=parseAddress(item.address);
      return {
        NR:         item.nr||'',
        NAZWA:      item.name||'',
        ULICA:      p.street||'',
        'NR DOMU/DZ': p.houseNr||'',
        MIASTO:     p.city||'Grudziądz',
        LAT:        item.lat??'',
        LNG:        item.lng??'',
        GPS:        item.lat?item.lat.toFixed(5)+', '+item.lng.toFixed(5):'',
        EDYTOWANO:  item.updatedAt||item.createdAt||''
      };
    });
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[{wch:6},{wch:26},{wch:26},{wch:14},{wch:16},{wch:12},{wch:12},{wch:24},{wch:18}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,tab==='keys'?'Klucze':'Piloty');
    XLSX.writeFile(wb,(tab==='keys'?'klucze':'piloty')+'_'+Date.now()+'.xlsx');
    setStatus('✓ Pobrano XLSX ('+data.length+' pozycji)');
  }catch(err){ setStatus('❌ Błąd XLSX: '+err.message); }
}

// ──────────────────────────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────────────────────────
function saveToMem(){
  localStorage.setItem(LS.keys,   JSON.stringify(state.keys));
  localStorage.setItem(LS.pilots, JSON.stringify(state.pilots));
  updateUI();
}
function updateUI(){
  document.getElementById('cnt-keys').textContent   = '('+state.keys.length+')';
  document.getElementById('cnt-pilots').textContent = '('+state.pilots.length+')';
  document.getElementById('save-btn').disabled      = state[tab].length===0;
}
function toggleDD(e){
  e.stopPropagation();
  document.getElementById('ddmenu').classList.toggle('open');
}
document.addEventListener('click',()=>{
  document.getElementById('ddmenu').classList.remove('open');
  const r=document.getElementById('ms-results');
  if(r) r.style.display='none';
});
